name: Coverage

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  coverage:
    name: Build, test and generate coverage badge
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build libcurl4-openssl-dev nlohmann-json3-dev \
            gcc-14 g++-14 gcovr

      - name: Cache CMake coverage build
        uses: actions/cache@v4
        with:
          path: build/cov
          key: ${{ runner.os }}-coverage-cmake-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-coverage-cmake-

      - name: Configure (coverage preset)
        env:
          CC:  gcc-14
          CXX: g++-14
        run: cmake --preset coverage

      - name: Build
        run: cmake --build --preset coverage

      - name: Run unit tests
        run: ctest --test-dir build/cov --output-on-failure

      - name: Generate coverage percentage
        id: coverage
        run: |
          gcovr --root . --filter 'src/' --exclude 'tests/' --exclude '_deps/' \
            --gcov-executable gcov-14 \
            build/cov --print-summary > coverage-summary.txt
          pct=$(awk '/lines:/{print $2}' coverage-summary.txt | tr -d '%')
          if [[ -z "$pct" ]]; then
            echo "Failed to extract coverage percentage"
            cat coverage-summary.txt
            exit 1
          fi
          echo "value=${pct}" >> "$GITHUB_OUTPUT"
          cat coverage-summary.txt

      - name: Generate coverage badge JSON (shields.io endpoint schema v1)
        run: |
          pct='${{ steps.coverage.outputs.value }}'
          val=${pct%%.*}
          color="red"
          if (( val >= 85 )); then color="brightgreen";
          elif (( val >= 70 )); then color="yellow";
          fi

          mkdir -p pages
          gcovr --root . --filter 'src/' --exclude 'tests/' --exclude '_deps/' \
            --gcov-executable gcov-14 \
            --html pages/coverage.html --html-details build/cov || true

          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' \
            "${pct}" "${color}" > pages/coverage-badge.json
          cat pages/coverage-badge.json

          echo "### Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "**Lines coverage:** ${pct}%" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

  deploy:
    name: Deploy coverage badge to GitHub Pages
    needs: coverage
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

