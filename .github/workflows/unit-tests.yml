name: Unit Tests (C++20)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit_tests:
    name: Unit tests C++20 — ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            compiler: gcc-12
            cc: gcc-12
            cxx: g++-12
          - os: ubuntu-24.04
            compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
          - os: macos-14
            compiler: clang-17
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build libcurl4-openssl-dev nlohmann-json3-dev \
            ${{ matrix.cc }} ${{ matrix.cxx }}

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja curl nlohmann-json

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/default
          key: ${{ runner.os }}-${{ matrix.compiler }}-cmake-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-cmake-

      - name: Show versions
        run: |
          cmake --version
          ninja --version
          ${{ matrix.cxx }} --version

      - name: Configure
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake --preset default \
            -DDBC_ENABLE_COVERAGE=OFF

      - name: Build
        run: cmake --build --preset default

      - name: Run unit tests
        run: ctest --preset default --output-on-failure
